# Coolify deployment for Hermes Agent.
#
# Uses the official production image instead of rebuilding the large upstream
# Dockerfile on every deploy. Keep /opt/data persistent; it is the single source
# of truth for config, secrets, sessions, memories, skills, profiles, cron, and
# logs.
services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile.coolify
    restart: unless-stopped
    command: ["gateway", "run"]
    ports:
      - "8642:8642"
    volumes:
      - hermes-data:/opt/data
    environment:
      HERMES_UID: "${HERMES_UID:-10000}"
      HERMES_GID: "${HERMES_GID:-10000}"
      API_SERVER_ENABLED: "${API_SERVER_ENABLED:-true}"
      API_SERVER_HOST: "${API_SERVER_HOST:-0.0.0.0}"
      API_SERVER_PORT: "${API_SERVER_PORT:-8642}"
      API_SERVER_KEY: "${API_SERVER_KEY}"
      API_SERVER_CORS_ORIGINS: "${API_SERVER_CORS_ORIGINS:-}"
      HERMES_DASHBOARD: "${HERMES_DASHBOARD:-0}"
      HERMES_DASHBOARD_HOST: "${HERMES_DASHBOARD_HOST:-127.0.0.1}"
      HERMES_DASHBOARD_PORT: "${HERMES_DASHBOARD_PORT:-9119}"
      HERMES_DASHBOARD_INSECURE: "${HERMES_DASHBOARD_INSECURE:-}"
      HERMES_DASHBOARD_OAUTH_CLIENT_ID: "${HERMES_DASHBOARD_OAUTH_CLIENT_ID:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      NOVITA_API_KEY: "${NOVITA_API_KEY:-}"
      GLM_API_KEY: "${GLM_API_KEY:-}"
      KIMI_API_KEY: "${KIMI_API_KEY:-}"
      MINIMAX_API_KEY: "${MINIMAX_API_KEY:-}"
      HF_TOKEN: "${HF_TOKEN:-}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_ALLOWED_USERS: "${TELEGRAM_ALLOWED_USERS:-}"
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN:-}"
      DISCORD_ALLOWED_USERS: "${DISCORD_ALLOWED_USERS:-}"
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN:-}"
      SLACK_APP_TOKEN: "${SLACK_APP_TOKEN:-}"
      SLACK_ALLOWED_USERS: "${SLACK_ALLOWED_USERS:-}"
      GATEWAY_ALLOWED_USERS: "${GATEWAY_ALLOWED_USERS:-}"
      GATEWAY_ALLOW_ALL_USERS: "${GATEWAY_ALLOW_ALL_USERS:-false}"
      EXA_API_KEY: "${EXA_API_KEY:-}"
      FIRECRAWL_API_KEY: "${FIRECRAWL_API_KEY:-}"
      FAL_KEY: "${FAL_KEY:-}"
      BROWSERBASE_API_KEY: "${BROWSERBASE_API_KEY:-}"
      BROWSERBASE_PROJECT_ID: "${BROWSERBASE_PROJECT_ID:-}"
      HONCHO_API_KEY: "${HONCHO_API_KEY:-}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${API_SERVER_PORT:-8642}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    shm_size: "1gb"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

volumes:
  hermes-data:
